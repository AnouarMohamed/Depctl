name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  push_to_registry:
    name: Push Docker image to Registries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessary to push to GHCR
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: |
            anouarmohamedx/depctl:latest
            anouarmohamedx/depctl:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner_id }}/depctl:latest
            ghcr.io/${{ github.repository_owner_id }}/depctl:${{ github.ref_name }}
