name: Publish Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  push_to_dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: anouarmohamedx/depctl:latest,anouarmohamedx/depctl:${{ github.ref_name }}

  push_to_ghcr:
    name: Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner | lower }}/depctl:latest
            ghcr.io/${{ github.repository_owner | lower }}/depctl:${{ github.ref_name }}
