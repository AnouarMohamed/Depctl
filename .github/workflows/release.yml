name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          name="depctl_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w" -o "dist/${name}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: depctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  github_release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: binaries
    timeout-minutes: 10

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
