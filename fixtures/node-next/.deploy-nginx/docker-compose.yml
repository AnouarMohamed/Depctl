services:

  web:
    
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app_net
    env_file:
      - .env
    



  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./.deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge




volumes:
  certs:
  
  
  

